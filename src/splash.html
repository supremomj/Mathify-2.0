<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathify</title>
    <style>
        html,
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #ede9fe 40%, #fce7f3 100%);
            background-size: 300% 300%;
            animation: gradBg 8s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
        }

        @keyframes gradBg {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-glow {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.5) 0%, rgba(139, 92, 246, 0.3) 50%, transparent 70%);
            animation: glowPulse 1.4s ease-in-out infinite;
            pointer-events: none;
        }

        .logo-img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            animation: beat 1.4s ease-in-out infinite;
            filter: drop-shadow(0 0 18px rgba(139, 92, 246, 0.7)) drop-shadow(0 0 36px rgba(99, 102, 241, 0.4));
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1);
            }

            14% {
                transform: scale(1.08);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.05);
            }

            70% {
                transform: scale(1);
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .app-name {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInText 0.8s ease-out 0.4s forwards;
        }

        .app-tagline {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.18em;
            color: #8b8fb5;
            opacity: 0;
            animation: fadeInText 0.8s ease-out 0.7s forwards;
            text-transform: uppercase;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            opacity: 0;
            animation: fadeInText 0.5s ease-out 0.9s forwards;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(165, 180, 252, 0.7);
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBounce {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            50% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        @keyframes fadeInText {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
  <script src="api.js"></script>
</head>

<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <img class="logo-img" src="../assets/Final.png" alt="Mathify Logo" draggable="false">
        </div>
        <div class="app-name">MATHIFY</div>
        <div class="app-tagline">Learn · Play · Grow</div>
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</body>

</html>
